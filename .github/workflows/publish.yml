# .github/workflows/publish.yml

name: Build and Publish NuGet Package

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to publish
        required: true
        type: string


jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          dotnet-version: '10.0.x'
          source-url: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

      - name: Verify tag exists
        if: github.event_name == 'workflow_dispatch'
        run: |
          git fetch --tags
          git rev-parse "refs/tags/${{ inputs.tag }}" >/dev/null 2>&1 || {
            echo "Tag '${{ inputs.tag }}' does not exist."
            exit 1
          }

      - name: Extract version from tag
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Update .csproj with version
        run: |
          libcsproj=$(find . -name "FileEncrypter.csproj" | head -n 1)
          toolcsproj=$(find . -name "FileEncrypter.Tool.csproj" | head -n 1)
          version="${{ steps.get_version.outputs.VERSION }}"
          echo "Setting version to $version in $libcsproj and $toolcsproj "

          # Remove old version tags
          sed -i '/<Version>.*<\/Version>/d' "$libcsproj"
          sed -i '/<Version>.*<\/Version>/d' "$toolcsproj"
          sed -i '/<InformationalVersion>.*<\/InformationalVersion>/d' "$libcsproj"
          sed -i '/<InformationalVersion>.*<\/InformationalVersion>/d' "$toolcsproj"

          # Inject new version tags before </PropertyGroup>
          sed -i "s|</PropertyGroup>|  <Version>${version}</Version>\n  <InformationalVersion>${version}</InformationalVersion>\n</PropertyGroup>|" "$libcsproj"
          sed -i "s|</PropertyGroup>|  <Version>${version}</Version>\n  <InformationalVersion>${version}</InformationalVersion>\n</PropertyGroup>|" "$toolcsproj"

      - name: Restore dependencies
        run: dotnet restore ./FileEncrypter.Tool/FileEncrypter.Tool.csproj

      - name: Build
        run: dotnet build ./FileEncrypter.Tool/FileEncrypter.Tool.csproj --configuration Release --no-restore

      - name: Pack
        run: dotnet pack ./FileEncrypter.Tool/FileEncrypter.Tool.csproj --configuration Release --no-build --output ./nupkgs

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push ./nupkgs/FileEncrypter.Tool*.nupkg \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key ${{ secrets.GITHUB_TOKEN }}

      - name: NuGet login
        uses: NuGet/login@v1.2.0
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
