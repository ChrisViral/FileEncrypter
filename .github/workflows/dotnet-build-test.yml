# .github/workflows/dotnet-build-test.yml
name: Build and Test (.NET 10.0)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build_and_test:
    name: Build on .NET 10.0 and run unit tests
    runs-on: windows-latest     # Needed for DPAPI tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: |
          dotnet test FileEncrypter.Tests/FileEncrypter.Tests.csproj \
            --configuration Release \
            --verbosity normal \
            --no-build   # build already done above
