# .github/workflows/dotnet-build-test.yml

name: Build and Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build_and_test:
    name: Build on .NET 10.0 and run unit tests
    runs-on: windows-latest     # Needed for DPAPI tests

    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run unit tests
        run: |
          dotnet test --configuration Release --no-build --no-restore --verbosity normal
